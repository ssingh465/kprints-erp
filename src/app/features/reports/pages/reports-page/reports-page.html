<section class="reports-page">
  <div>
    <h1 class="page-title">Reports & Analytics</h1>
    <p class="page-subtitle">Operational, sales, inventory, shipment, and financial reporting packs.</p>
  </div>
  <div class="report-grid">
    @for (report of reports; track report[0]) {
      <article class="erp-panel">
        <i class="pi pi-chart-line"></i>
        <div>
          <strong>{{ report[0] }}</strong>
          <p>{{ report[1] }}</p>
        </div>
        <button pButton type="button" icon="pi pi-arrow-right" class="p-button-text" aria-label="Open report"></button>
      </article>
    }
  </div>
</section>
