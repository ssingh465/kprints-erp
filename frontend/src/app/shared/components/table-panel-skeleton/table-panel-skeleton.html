<div class="table-panel-skeleton">
  @if (showToolbar) {
    <div class="skeleton-toolbar">
      <p-skeleton width="240px" height="2.5rem" borderRadius="8px" />
      <p-skeleton width="108px" height="2.5rem" borderRadius="8px" />
    </div>
  }
  <p-skeleton width="100%" height="2.25rem" borderRadius="6px" />
  @for (row of rowIndices(); track row) {
    <p-skeleton width="100%" height="2.75rem" borderRadius="6px" />
  }
</div>
