<div class="kanban-skeleton">
  @for (column of columnIndices(); track column) {
    <article class="kanban-skeleton-column">
      <p-skeleton width="72%" height="1.1rem" borderRadius="6px" />
      @for (card of cardIndices(); track card) {
        <p-skeleton width="100%" height="88px" borderRadius="8px" />
      }
    </article>
  }
</div>
